name: prakruti
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  camera: ^0.11.2
  image_picker: ^1.2.0
  http: ^1.5.0
  cupertino_icons: ^1.0.2
  google_fonts: ^5.1.0
  provider: ^6.0.5
  flutter_svg: ^2.0.7
  animated_text_kit: ^4.2.2
  shared_preferences: ^2.2.1
  connectivity_plus: ^5.0.1
  url_launcher: ^6.1.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  fonts:
    - family: NotoSansGujarati
      fonts:
        - asset: assets/fonts/NotoSansGujarati-Regular.ttf
        - asset: assets/fonts/NotoSansGujarati-Bold.ttf
          weight: 700
    
  assets:
    - assets/images/
    - assets/fonts/
    - assets/lang/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
